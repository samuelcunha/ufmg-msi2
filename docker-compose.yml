services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: coverit
      MYSQL_USER: coverit
      MYSQL_PASSWORD: coverit
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    restart: unless-stopped
    env_file:
      - ./api/.env
    ports:
      - "5001:5000"
    volumes:
      - ./api:/app
    command: uwsgi --ini /app/wsgi.ini --py-autoreload=1
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
