name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to image registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.OCIR_REGISTRY }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_AUTH_TOKEN }}

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.OCIR_IMAGE }}

      - name: Deploy to api VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            sudo docker compose pull api
            sudo docker compose up -d --force-recreate api

# web is deployed by Vercel's native GitHub integration (Project Settings ->
# Git), not from here — every push already triggers its own build/deploy
# there, with preview deployments on PRs. No job needed in this workflow.
